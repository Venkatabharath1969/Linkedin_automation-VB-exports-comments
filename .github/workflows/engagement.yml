name: LinkedIn Engagement Bot

on:
  schedule:
    # Every 2 hours - engagement run (no git commit)
    - cron: "0 */2 * * *"
    # Midnight UTC daily - engagement run + git-commit state snapshot
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes to LinkedIn)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      profile:
        description: "Profile ID to run (leave blank for all)"
        required: false
        default: ""
      commit_state:
        description: "Commit state to git after run"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  engage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit state file back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run engagement bot
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_ORG_URN:      ${{ secrets.LINKEDIN_ORG_URN }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          PROFILE_FLAG=""
          if [ -n "${{ inputs.profile }}" ]; then
            PROFILE_FLAG="--profile ${{ inputs.profile }}"
          fi

          # Always commit state so processed comment IDs persist across runs.
          # _git_commit_state() uses 'git diff --quiet' internally - only commits
          # when state actually changed (new comments processed). Zero noise on quiet runs.
          COMMIT_FLAG="--commit-state"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            COMMIT_FLAG=""  # never commit state in dry-run mode
          fi

          echo "Running: python engagement_bot.py $PROFILE_FLAG $DRY_FLAG $COMMIT_FLAG"
          python engagement_bot.py $PROFILE_FLAG $DRY_FLAG $COMMIT_FLAG
